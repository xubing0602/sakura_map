<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sakura Map 🌸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/png" href="./favicon/sakura_map_favicon_gemini.png">
    <link rel="apple-touch-icon" href="./favicon/sakura_map_favicon_gemini.png">
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar" class="sidebar open">
        <div class="sidebar__header">
          <div>
            <h1>Sakura Map　🌸</h1>
            <p class="subtitle">さくら名所</p>
          </div>
          <button id="toggleSidebar" class="icon-button" aria-label="Toggle sidebar">
            ≡
          </button>
        </div>

        <div class="sidebar__section mode-panel">
          <div class="tab-group" role="tablist" aria-label="Map tabs">
            <button class="tab-button is-active" data-mode="current" role="tab" aria-selected="true">
              現在の状況
            </button>
            <button class="tab-button" data-mode="forecast" role="tab" aria-selected="false">
              桜レーダー
            </button>
          </div>
          <div id="forecastControls" class="forecast-controls is-hidden" aria-hidden="true">
            <div class="timeline">
              <div class="timeline-row">
                <span class="timeline-label">タイムライン</span>
                <span id="forecastDateLabel" class="timeline-date">03/17</span>
              </div>
              <input id="forecastRange" type="range" min="0" max="0" value="0" />
              <div class="timeline-hint">
                <span id="forecastStartLabel">03/17</span>
                <span id="forecastEndLabel">05/24</span>
              </div>
            </div>
          </div>
        </div>

        <div class="sidebar__section">
          <div class="filter-row">
            <input id="searchBox" type="search" placeholder="名所名で検索" />
            <span id="resultCount" class="chip">0</span>
          </div>
        </div>

        <details class="filter-section" open>
          <summary>地方</summary>
          <div id="areaFilters" class="filter-group filter-scroll"></div>
        </details>

        <details class="filter-section" open>
          <summary>都道府県</summary>
          <div id="prefectureFilters" class="filter-group filter-scroll"></div>
        </details>

        <details class="filter-section" open>
          <summary>開花状況</summary>
          <div id="statusFilters" class="filter-group filter-scroll"></div>
        </details>

        <details class="filter-section" open>
          <summary>特徴タグ</summary>
          <div id="tagFilters" class="filter-group filter-scroll"></div>
        </details>

        <details class="filter-section" open>
          <summary>県内ランキング</summary>
          <div class="range-wrapper">
            <input id="rankingRange" type="range" min="1" max="20" value="20" />
            <span id="rankingValue" class="chip">≤ 20</span>
          </div>
        </details>



        <div class="sidebar__section reset-section">
          <button id="resetFilters" class="reset-button" type="button">リセット</button>
        </div>

        <div class="sidebar__section sidebar__footer">
          <p>データ: weathernews.jp</p>
        </div>
      </aside>

      <main class="map-wrapper">
        <div id="map"></div>
        <div class="map-overlay">
          <div class="legend">
            <span id="legendLabel">ステータス別アイコン表示</span>
          </div>
        </div>
        <button id="showSidebar" class="show-sidebar-button" aria-label="Show sidebar">☰</button>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
