<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WN Sakura Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar__header">
          <div>
            <h1>WN Sakura Map</h1>
            <p class="subtitle">Weathernews さくら名所</p>
          </div>
          <button id="toggleSidebar" class="icon-button" aria-label="Toggle sidebar">
            ≡
          </button>
        </div>

        <div class="sidebar__section">
          <div class="filter-row">
            <input id="searchBox" type="search" placeholder="名所名で検索" />
            <span id="resultCount" class="chip">0</span>
          </div>
        </div>

        <div class="sidebar__section">
          <h2>地区</h2>
          <div id="areaFilters" class="filter-group"></div>
        </div>

        <div class="sidebar__section">
          <h2>都道府県</h2>
          <div id="prefectureFilters" class="filter-group"></div>
        </div>

        <div class="sidebar__section">
          <h2>特徴タグ</h2>
          <div id="tagPrimary" class="filter-group"></div>
          <button id="toggleTags" class="link-button">他のタグを表示</button>
          <div id="tagMore" class="filter-group hidden"></div>
        </div>

        <div class="sidebar__section">
          <h2>県内ランキング</h2>
          <div class="range-wrapper">
            <input id="rankingRange" type="range" min="1" max="20" value="20" />
            <span id="rankingValue" class="chip">≤ 20</span>
          </div>
        </div>

        <div class="sidebar__section">
          <h2>開花状態</h2>
          <div id="statusFilters" class="filter-group"></div>
        </div>

        <div class="sidebar__section sidebar__footer">
          <p>データ: weathernews.jp</p>
        </div>
      </aside>

      <main class="map-wrapper">
        <div id="map"></div>
        <div class="map-overlay">
          <div class="legend">
            <span>ステータス別アイコン表示</span>
          </div>
        </div>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
